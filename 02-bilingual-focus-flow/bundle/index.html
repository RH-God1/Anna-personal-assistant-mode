<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>双语 Focus Flow</title>
    <link rel="icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
  </head>
  <body data-state="idle">
    <main class="shell">
      <header class="topbar">
        <div class="brand"><span class="brand-mark"></span><strong data-i18n="appName">专注流</strong></div>
        <div class="top-actions">
          <select id="locale" aria-label="语言">
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
          </select>
          <button id="theme" class="icon-button" type="button" aria-label="切换主题">◐</button>
        </div>
      </header>

      <section class="card timer-card">
        <input id="topic" maxlength="120" autocomplete="off" placeholder="这次准备专注做什么？">
        <div class="ring" role="img" aria-label="专注计时器">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle class="track" cx="110" cy="110" r="96"></circle>
            <circle class="progress" cx="110" cy="110" r="96"></circle>
          </svg>
          <div class="clock"><strong id="time">25:00</strong><span id="status">准备开始</span></div>
        </div>
        <div class="presets" role="group" aria-label="时长预设">
          <button data-minutes="15">15 <span class="minute-unit">分</span></button>
          <button class="active" data-minutes="25">25 <span class="minute-unit">分</span></button>
          <button data-minutes="45">45 <span class="minute-unit">分</span></button>
          <button data-minutes="60">60 <span class="minute-unit">分</span></button>
        </div>
        <div class="controls">
          <button id="primary" class="primary" type="button">开始</button>
          <button id="end" type="button" hidden>结束</button>
          <button id="coach" type="button">询问教练</button>
        </div>
      </section>

      <section class="card stats-card">
        <header><h2 data-i18n="today">今日专注</h2><span id="summary">0 次 · 0 分</span></header>
        <ol id="history"><li class="empty" data-i18n="emptyHistory">还没有专注记录，从上方开始第一个专注块。</li></ol>
      </section>

      <footer><span id="connection" class="dot"></span><span id="connectionText">独立预览</span><span>v1.0.0</span></footer>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
