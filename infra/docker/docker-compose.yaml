services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anna_controlled_assistant
      POSTGRES_USER: anna
      POSTGRES_PASSWORD: anna
    ports:
      - "5432:5432"
    volumes:
      - anna_postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anna -d anna_controlled_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - anna_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  anna_postgres:
  anna_redis:

