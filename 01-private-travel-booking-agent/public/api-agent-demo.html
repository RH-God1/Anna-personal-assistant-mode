<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel Agent API Demo</title>
    <style>
      :root {
        --ink: #151b22;
        --muted: #5f6874;
        --line: #d7dde5;
        --paper: #fbfaf7;
        --blue: #2458d3;
        --green: #1e7f58;
        --red: #bb2b2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: #ece8de;
        font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 32px auto;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 0;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1.8px;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      form,
      .output {
        padding: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-weight: 700;
      }

      input,
      select {
        min-height: 39px;
        padding: 7px 10px;
        border: 1px solid #cfd6df;
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
        accent-color: var(--blue);
      }

      .check-row {
        display: grid;
        grid-template-columns: 22px 1fr;
        align-items: start;
        gap: 9px;
        padding: 10px;
        border: 1px solid rgba(36, 88, 211, 0.18);
        border-radius: 8px;
        background: rgba(36, 88, 211, 0.05);
        color: var(--ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .check-row span {
        color: var(--muted);
        font-weight: 600;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        min-height: 38px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }

      button.success {
        border-color: var(--green);
        color: var(--green);
      }

      button.danger {
        border-color: var(--red);
        color: var(--red);
      }

      .status {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 4px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.74);
        font-size: 13px;
        font-weight: 800;
      }

      pre {
        min-height: 420px;
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        color: #1e2936;
        font-size: 13px;
        line-height: 1.5;
      }

      .notice {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.55;
      }

      @media (max-width: 820px) {
        header,
        .grid {
          display: block;
        }

        section {
          margin-bottom: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">API SANDBOX</p>
          <h1>Travel Agent API</h1>
        </div>
        <span class="status" id="status">等待启动</span>
      </header>

      <div class="grid">
        <section>
          <form id="form">
            <p class="notice">只提交行程查询字段，不提交姓名、证件、手机号、银行卡、验证码或支付信息。</p>
            <label>产品
              <select id="product">
                <option value="flight">机票</option>
                <option value="rail">高铁</option>
                <option value="bus">巴士</option>
                <option value="hotel">酒店</option>
              </select>
            </label>
            <label>平台
              <select id="provider">
                <option value="">自动选择 sandbox</option>
              </select>
            </label>
            <label>出发地 / 酒店目的地
              <input id="origin" value="SHA">
            </label>
            <label>目的地
              <input id="destination" value="BJS">
            </label>
            <label>出发日期 / 入住日期
              <input id="departureDate" type="date" value="2026-07-01">
            </label>
            <label class="check-row">
              <input id="llmConsent" type="checkbox">
              <span>允许后端 LLM 使用非个人行程查询生成建议。姓名、证件、手机号、银行卡、验证码和支付信息仍不会提交。</span>
            </label>
            <div class="actions">
              <button class="primary" type="submit">启动 Agent</button>
              <button type="button" id="travelerDone">用户已输入信息</button>
              <button class="success" type="button" id="paymentDone">用户已付款</button>
              <button type="button" id="llmAdvice">生成 LLM 建议</button>
            </div>
          </form>
        </section>
        <section class="output">
          <pre id="output"></pre>
        </section>
      </div>
    </main>

    <script>
      const state = {
        runId: null
      };

      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");
      const providerEl = document.getElementById("provider");
      const llmConsentEl = document.getElementById("llmConsent");

      document.getElementById("form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const product = document.getElementById("product").value;
        const body = {
          product,
          provider: providerEl.value || undefined,
          search: {
            product,
            origin: document.getElementById("origin").value,
            destination: document.getElementById("destination").value,
            departureDate: document.getElementById("departureDate").value,
            checkInDate: document.getElementById("departureDate").value,
            passengers: {
              adults: 1
            }
          }
        };

        setStatus("运行中");
        const run = await postJson("/api/agent/run", body);
        state.runId = run.id;
        render(run);
      });

      document.getElementById("travelerDone").addEventListener("click", async () => {
        if (!state.runId) return;
        const run = await postJson(`/api/agent/runs/${state.runId}/continue`, {
          event: "traveler_info_completed"
        });
        render(run);
      });

      document.getElementById("paymentDone").addEventListener("click", async () => {
        if (!state.runId) return;
        const run = await postJson(`/api/agent/runs/${state.runId}/continue`, {
          event: "payment_completed"
        });
        render(run);
      });

      document.getElementById("llmAdvice").addEventListener("click", async () => {
        if (!state.runId) return;
        const run = await postJson(`/api/agent/runs/${state.runId}/llm-advice`, {
          consentToShareWithLLM: llmConsentEl.checked
        });
        render(run);
      });

      async function loadPlatforms() {
        const response = await fetch("/api/platforms");
        const body = await response.json();
        for (const platform of body.platforms) {
          const option = document.createElement("option");
          option.value = platform.id;
          option.textContent = `${platform.displayName} (${platform.mode})`;
          providerEl.appendChild(option);
        }
      }

      async function loadLLMStatus() {
        const response = await fetch("/api/llm/status");
        const body = await response.json();
        outputEl.textContent = JSON.stringify({
          llm: body,
          note: "前端只看到配置状态，不会拿到 OPENAI_API_KEY。"
        }, null, 2);
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });
        return response.json();
      }

      function render(run) {
        setStatus(run.state || "未知状态");
        outputEl.textContent = JSON.stringify(run, null, 2);
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      void loadPlatforms();
      void loadLLMStatus();
    </script>
  </body>
</html>
