<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel Agent Manual Flow Test</title>
    <link rel="stylesheet" href="../src/content.css">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #151b22;
        background: #f0eee7;
        font-family: "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
      }

      .demo {
        width: min(860px, calc(100vw - 32px));
        margin: 42px auto;
        padding: 28px;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #fffdf8;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 26px;
        letter-spacing: 0;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
        font-weight: 700;
      }

      input {
        min-height: 40px;
        padding: 8px 10px;
        border: 1px solid #cfd6df;
        border-radius: 7px;
        font: inherit;
      }

      button {
        min-height: 40px;
        margin-top: 10px;
        padding: 8px 14px;
        border: 1px solid #2458d3;
        border-radius: 7px;
        background: #2458d3;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      .secondary {
        border-color: #1f7a56;
        background: #1f7a56;
      }

      .note {
        color: #596575;
      }
    </style>
  </head>
  <body>
    <main class="demo">
      <h1>本地预订流程模拟</h1>
      <div id="stage"></div>
      <button class="secondary" id="startAgent">启动测试 Agent</button>
    </main>

    <script>
      const listeners = [];
      const memory = new Map();

      window.chrome = {
        runtime: {
          onMessage: {
            addListener(listener) {
              listeners.push(listener);
            }
          }
        },
        storage: {
          local: {
            get(keys, callback) {
              const result = {};
              const list = Array.isArray(keys) ? keys : [keys];
              list.forEach((key) => {
                if (memory.has(key)) result[key] = memory.get(key);
              });
              callback(result);
            },
            set(nextValues) {
              Object.entries(nextValues).forEach(([key, value]) => memory.set(key, value));
            }
          }
        }
      };

      function sendAgentMessage(message) {
        listeners.forEach((listener) => {
          listener(message, {}, () => {});
        });
      }

      const stage = document.getElementById("stage");

      function renderSearch() {
        stage.innerHTML = `
          <p class="note">阶段：查询航班</p>
          <label>出发城市 <input placeholder="上海"></label>
          <label>到达城市 <input placeholder="北京"></label>
          <button id="search">搜索</button>
        `;
        document.getElementById("search").addEventListener("click", renderPassenger);
      }

      function renderPassenger() {
        stage.innerHTML = `
          <p class="note">阶段：旅客信息</p>
          <label>乘机人姓名 <input name="passenger_name"></label>
          <label>身份证号码 <input name="identity_number"></label>
          <label>手机号 <input type="tel" name="mobile"></label>
          <button id="confirmOrder">确认订单</button>
        `;
        document.getElementById("confirmOrder").addEventListener("click", renderPayment);
      }

      function renderPayment() {
        stage.innerHTML = `
          <p class="note">阶段：收银台</p>
          <h2>订单待支付</h2>
          <button id="pay">立即支付</button>
          <button class="secondary" id="paid">模拟支付成功</button>
        `;
        document.getElementById("paid").addEventListener("click", renderDone);
      }

      function renderDone() {
        stage.innerHTML = `
          <p class="note">阶段：支付成功</p>
          <h2>支付成功，订单完成，出票中</h2>
        `;
      }

      document.getElementById("startAgent").addEventListener("click", () => {
        sendAgentMessage({
          type: "TRAVEL_AGENT_START",
          settings: { autoNavigation: true, quietMode: true }
        });
      });

      renderSearch();
    </script>
    <script src="../src/content.js"></script>
  </body>
</html>
